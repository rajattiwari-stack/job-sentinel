name: Job Sentinel

on:
  schedule:
    # GitHub cron is UTC. IST = UTC+5:30.
    # 10:00 / 14:00 / 18:00 / 22:00 IST  →  04:30 / 08:30 / 12:30 / 16:30 UTC
    # NOTE: GitHub may delay scheduled runs by a few minutes under load — normal.
    - cron: "30 4 * * *"
    - cron: "30 8 * * *"
    - cron: "30 12 * * *"
    - cron: "30 16 * * *"
  workflow_dispatch: {}        # manual "Run workflow" button for testing

permissions:
  contents: write              # needed to commit the seen-jobs state file

# Never let two runs race on the state file.
concurrency:
  group: job-sentinel
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25        # hard stop — a hung run must not burn minutes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional email fallback:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m src.main

      - name: Commit updated state
        if: always()           # save progress even if the scan exit code was non-zero
        run: |
          git config user.name "job-sentinel[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add state/seen_jobs.json tracker.xlsx
          if git diff --cached --quiet; then
            echo "No state changes."
          else
            git commit -m "chore: update seen-jobs state [skip ci]"
            # Rebase-then-push handles a human pushing config edits mid-run.
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            git push
          fi
