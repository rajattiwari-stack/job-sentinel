# Company registry. Adding a company = adding an entry here. No code changes.
#
# ats: greenhouse | lever | ashby | smartrecruiters | workday
# slug: the ATS board token — find it in the careers-page URL:
#   greenhouse:      boards.greenhouse.io/<slug>          or job-boards.greenhouse.io/<slug>
#   lever:           jobs.lever.co/<slug>
#   ashby:           jobs.ashbyhq.com/<slug>
#   smartrecruiters: careers.smartrecruiters.com/<slug>   or jobs.smartrecruiters.com/<slug>
#   workday:         <host>/<path>/...  e.g. https://crowdstrike.wd5.myworkdayjobs.com/crowdstrikecareers
#
# Run `python scripts/validate_companies.py` after editing — it pings every
# endpoint and tells you which slugs are wrong BEFORE you rely on them.
# Set enabled: false to pause a company without deleting it.

